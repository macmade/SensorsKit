name: ci-mac
on:   [push]
jobs:
    ci:
        runs-on: macos-latest
        strategy:
            matrix:
                run-config:
                    - { scheme: 'SensorsKit', configuration: 'Debug',   project: 'SensorsKit.xcodeproj', build: 1, analyze: 1, test: 0, info: 1, destination: 'platform=macOS' }
                    - { scheme: 'SensorsKit', configuration: 'Release', project: 'SensorsKit.xcodeproj', build: 1, analyze: 1, test: 0, info: 1, destination: 'platform=macOS' }
        steps:
            
            - uses: actions/checkout@v6
              with:
                submodules: 'recursive'
                
            - uses: macmade/action-xcodebuild@v1.0.0